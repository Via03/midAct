

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Task Lists</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { 
            background: linear-gradient(120deg, #d1f7ff, #a0e8f0); 
            font-family: 'Segoe UI', sans-serif;
        }
        .navbar { background: #20c997; }
        .navbar-brand { color: #fff !important; font-weight: 700; }
        .card {
            border-radius: 15px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.15);
            background-color: #ffffffcc;
            transition: transform 0.2s;
        }
        .card:hover { transform: translateY(-5px); }
        .badge-status { font-size: 0.85em; padding: 0.5em 0.8em; font-weight: 600; }
        .btn-custom { min-width: 80px; }
        .table-hover tbody tr:hover { background-color: #b0f0ea; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg mb-4">
    <div class="container">
        <a class="navbar-brand" href="#">Task Lists</a>
        <div class="d-flex">
            <a href="{% url 'task_create' %}" class="btn" style="background-color:#20c997; color:#fff;">Add Task</a>
        </div>
    </div>
</nav>

<div class="container py-3">
    <div class="card p-4">
        <table class="table table-hover align-middle">
            <thead style="background-color:#a0e8f0; color:#000;">
                <tr>
                    <th>Title</th>
                    <th>Description</th>
                    <th>Status</th>
                    <th class="text-end">Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for task in tasks %}
                <tr>
                    <td>{{ task.title }}</td>
                    <td>{{ task.description|default:"" }}</td>
                    <td>
                        {% if task.completed %}
                            <span class="badge" style="background-color:#20c997;">Done</span>
                        {% else %}
                            <span class="badge" style="background-color:#3dd5d0; color:#000;">Pending</span>
                        {% endif %}
                    </td>
                    <td class="text-end">
                        <a href="{% url 'task_update' task.id %}" class="btn btn-info btn-sm btn-custom">Edit</a>
                        <a href="{% url 'task_delete' task.id %}" class="btn btn-danger btn-sm btn-custom">Delete</a>
                    </td>
                </tr>
                {% empty %}
                <tr>
                    <td colspan="4" class="text-center text-secondary"></td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>

</body>
</html>
