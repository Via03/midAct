
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Delete Task</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { 
            background: linear-gradient(to bottom, #d1f7ff, #a0e8f0); 
            font-family: 'Segoe UI', sans-serif;
        }
        .card {
            border-radius: 15px;
            max-width: 500px;
            margin: 120px auto;
            padding: 30px;
            text-align: center;
            background-color: #ffffffcc;
            box-shadow: 0 6px 20px rgba(0,0,0,0.15);
        }
        h2 { color:#20c997; font-weight:700; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h2>Delete Task</h2>
        <p>Are you sure you want to delete "<strong>{{ task.title }}</strong>"?</p>
        <form method="POST">
            {% csrf_token %}
            <button type="submit" class="btn" style="background-color:#20c997; color:#fff; margin-right:10px;">Yes, Delete</button>
            <a href="{% url 'task_list' %}" class="btn" style="background-color:#3dd5d0; color:#000;">Cancel</a>
        </form>
    </div>
</div>

</body>
</html>
